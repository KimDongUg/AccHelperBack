<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리비 조회 — AI Helper</title>
    <link rel="icon" type="image/png" href="/assets/images/robot.png">
    <link rel="stylesheet" href="/css/common.css?v=16">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #f5f7fa; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; color: #1a1a2e; min-height: 100vh; }

      .fee-wrap { max-width: 560px; margin: 0 auto; padding: 20px 16px 60px; }

      /* 인증 카드 */
      .verify-card {
        background: white;
        border-radius: 14px;
        padding: 24px 20px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        margin-bottom: 20px;
      }
      .verify-card h2 { font-size: 17px; font-weight: 700; color: #0d47a1; margin-bottom: 6px; }
      .verify-card p  { font-size: 12.5px; color: #888; margin-bottom: 18px; line-height: 1.5; }

      .form-row { display: flex; gap: 10px; margin-bottom: 12px; }
      .form-group { flex: 1; display: flex; flex-direction: column; gap: 5px; }
      .form-group.full { flex: none; width: 100%; }
      .form-group label { font-size: 12px; font-weight: 600; color: #555; }
      .form-group input {
        border: 1.5px solid #dde1e7;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 14px;
        font-family: inherit;
        outline: none;
        transition: border-color 0.2s;
        width: 100%;
      }
      .form-group input:focus { border-color: #1565c0; }
      .form-group input:disabled { background: #f5f5f5; color: #999; }

      .btn-verify {
        width: 100%;
        padding: 13px;
        background: linear-gradient(135deg, #1565c0, #0d47a1);
        color: white;
        border: none;
        border-radius: 9px;
        font-size: 15px;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        margin-top: 6px;
        transition: opacity 0.15s;
      }
      .btn-verify:hover { opacity: 0.9; }
      .btn-verify:disabled { opacity: 0.5; cursor: not-allowed; }

      .error-msg {
        display: none;
        margin-top: 12px;
        padding: 10px 14px;
        background: #ffebee;
        border-radius: 8px;
        color: #c62828;
        font-size: 13px;
        font-weight: 500;
      }
      .error-msg.show { display: block; }

      /* 인증번호 영역 */
      .otp-info {
        font-size: 12.5px;
        color: #1565c0;
        font-weight: 600;
        margin-bottom: 10px;
        padding: 8px 12px;
        background: #e3f2fd;
        border-radius: 8px;
      }
      .otp-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: -4px 0 4px;
        font-size: 12px;
      }
      .otp-timer { color: #888; }
      .btn-link {
        background: none;
        border: none;
        color: #1565c0;
        font-size: 12px;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        padding: 4px 0;
        text-decoration: underline;
      }
      .btn-link:disabled { color: #bbb; cursor: not-allowed; text-decoration: none; }

      .privacy-note {
        margin-top: 16px;
        font-size: 11.5px;
        color: #aaa;
        line-height: 1.6;
      }
      .privacy-note a { color: #888; text-decoration: underline; }

      /* 관리비 고지서 */
      .bill-card {
        display: none;
        background: white;
        border-radius: 14px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        overflow: hidden;
      }
      .bill-card.show { display: block; }

      .bill-header {
        background: linear-gradient(135deg, #1565c0, #0d47a1);
        color: white;
        padding: 20px;
        text-align: center;
        position: relative;
      }
      .bill-header .apt-name { font-size: 13px; opacity: 0.85; margin-bottom: 4px; }
      .bill-header .unit     { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
      .bill-header .period   { font-size: 13px; opacity: 0.85; }

      .bill-session {
        padding: 8px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #fff8e1;
        font-size: 12px;
        color: #8d6e00;
      }
      .bill-session .btn-link { color: #1565c0; }

      .bill-total {
        background: #e3f2fd;
        padding: 16px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #bbdefb;
      }
      .bill-total .label { font-size: 13px; color: #1565c0; font-weight: 600; }
      .bill-total .amount {
        font-size: 24px;
        font-weight: 800;
        color: #0d47a1;
        letter-spacing: -0.5px;
      }

      .bill-section { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
      .bill-section:last-child { border-bottom: none; }
      .section-title {
        font-size: 12px;
        font-weight: 700;
        color: #1565c0;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 10px;
      }

      /* 항목 테이블 */
      .fee-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
      .fee-table tr { border-bottom: 1px solid #f5f5f5; }
      .fee-table tr:last-child { border-bottom: none; }
      .fee-table td { padding: 7px 4px; }
      .fee-table td:first-child { color: #555; }
      .fee-table td.amt { text-align: right; font-weight: 600; color: #1a1a2e; }
      .fee-table td.div-badge { text-align: center; font-size: 11px; font-weight: 700;
        width: 26px; padding: 2px 0; border-radius: 3px; }
      .fee-table td.div-badge.과 { color: #1565c0; background: #e3f2fd; }
      .fee-table td.div-badge.비 { color: #555; background: #f5f5f5; }
      .fee-table tr.total-row td { font-weight: 700; color: #0d47a1; font-size: 14px; border-top: 1.5px solid #bbdefb; padding-top: 10px; }
      .fee-table tr.subtotal-row td { font-weight: 600; color: #333; font-size: 13px; border-top: 1px dashed #ddd; padding-top: 8px; }
      .fee-table tr.subtotal-row td.amt { color: #0d47a1; }

      /* 검침내역 테이블 */
      .meter-table { width: 100%; border-collapse: collapse; font-size: 13px; }
      .meter-table th {
        background: #e8eaf6;
        color: #3949ab;
        font-weight: 700;
        padding: 7px 8px;
        text-align: center;
        font-size: 12px;
      }
      .meter-table td { padding: 7px 8px; text-align: center; border-bottom: 1px solid #f0f0f0; color: #444; }
      .meter-table td:first-child { text-align: left; color: #555; font-weight: 600; }
      .meter-table tr:last-child td { border-bottom: none; }

      .no-data { color: #aaa; font-size: 13px; text-align: center; padding: 10px 0; }
    </style>
</head>
<body>

<header class="header" role="banner">
    <div class="header-left">
        <a href="/" id="headerLogo" class="header-logo" aria-label="AI Helper 홈으로 이동">
            <img src="/assets/images/robot.png" alt="AI Helper 로봇" aria-hidden="true"
                 srcset="/assets/images/robot@2x.png 2x, /assets/images/robot@3x.png 3x">
            <span class="logo-text">AI Helper</span>
        </a>
        <nav class="header-nav" aria-label="메인 내비게이션">
            <a href="/">AI 챗봇</a>
            <a href="/fee.html" class="active">관리비</a>
            <a href="/complaint.html" id="complaintNavLink" style="display:none"><span class="nav-long">민원게시판</span><span class="nav-short">민원</span></a>
            <a href="/market.html" id="daangnNavLink" style="display:none"><span class="nav-long">🥕 우리아파트 당근</span><span class="nav-short">🥕당근</span></a>
        </nav>
    </div>
    <div class="header-right">
        <span id="companyLabel" class="company-label" style="display:none;"></span>
        <a href="/login.html" class="btn btn-outline btn-sm" id="headerLoginLink" data-short="🔐">관리자 로그인</a>
        <a href="/admin.html" class="btn btn-outline btn-sm" id="adminLink" data-short="관리자" style="display:none">관리자</a>
    </div>
</header>

<main class="fee-wrap">

  <!-- 인증 폼 -->
  <div class="verify-card" id="verifyCard">
    <h2>관리비 조회</h2>
    <p>호수를 입력하면 등록된 휴대폰 번호로 인증번호를 보내드립니다. 인증 후 당월 관리비를 확인할 수 있습니다.</p>

    <div class="form-row">
      <div class="form-group">
        <label for="inp-ho">호</label>
        <input type="number" id="inp-ho" placeholder="예: 1203" inputmode="numeric">
      </div>
    </div>

    <button class="btn-verify" id="btnSendSms">인증번호 받기</button>

    <!-- 인증번호 입력 영역 -->
    <div id="otpArea" style="display:none; margin-top:14px;">
      <div class="otp-info" id="otpInfo"></div>
      <div class="form-row">
        <div class="form-group">
          <label for="inp-code">인증번호</label>
          <input type="tel" id="inp-code" placeholder="6자리 숫자" inputmode="numeric" maxlength="6">
        </div>
      </div>
      <div class="otp-meta">
        <span class="otp-timer" id="otpTimer"></span>
        <button class="btn-link" id="btnResend" type="button">인증번호 재발송</button>
      </div>
      <button class="btn-verify" id="btnVerifyOtp">조회하기</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <p class="privacy-note">
      본 서비스는 관리비 조회 목적으로 동호수 및 휴대폰 번호를 활용합니다.
      <a href="/privacy.html" target="_blank" rel="noopener">개인정보처리방침 보기</a>
    </p>
  </div>

  <!-- 고지서 -->
  <div class="bill-card" id="billCard">

    <div class="bill-header">
      <div class="apt-name" id="billAptName"></div>
      <div class="unit" id="billUnit"></div>
      <div class="period" id="billPeriod"></div>
    </div>

    <div class="bill-session">
      <span id="sessionTimer"></span>
      <button class="btn-link" id="btnNewSearch" type="button">다른 호수 조회</button>
    </div>

    <div class="bill-total">
      <div>
        <div style="font-size:12px;color:#1565c0;font-weight:600;margin-bottom:2px">납기내 납부금액</div>
        <div class="amount" id="billTotal"></div>
      </div>
      <div style="text-align:right">
        <div style="font-size:12px;color:#888;margin-bottom:2px">납기후</div>
        <div style="font-size:16px;font-weight:700;color:#555" id="billTotalAfter"></div>
      </div>
    </div>

    <!-- 검침내역 -->
    <div class="bill-section" id="meterSection" style="display:none">
      <div class="section-title">검침내역</div>
      <table class="meter-table">
        <thead><tr><th>검침항목</th><th>전월지침</th><th>당월지침</th><th>사용량(요금)</th></tr></thead>
        <tbody id="meterTableBody"></tbody>
      </table>
    </div>

    <!-- 항목별 부과내역 -->
    <div class="bill-section" id="itemSection" style="display:none">
      <div class="section-title">항목별 부과내역</div>
      <table class="fee-table"><tbody id="itemTableBody"></tbody></table>
    </div>

    <!-- 고지내역 요약 -->
    <div class="bill-section" id="summarySection">
      <div class="section-title">고지내역</div>
      <table class="fee-table"><tbody id="summaryTableBody"></tbody></table>
    </div>

  </div>
</main>

<script>
(async () => {
  // 공통 헤더 상태 (로그인/회사)
  try {
    const r = await fetch('/api/auth/me');
    if (r.ok) {
      const u = await r.json();
      document.getElementById('headerLoginLink').style.display = 'none';
      document.getElementById('adminLink').style.display = '';
    }
  } catch {}
  try {
    const r = await fetch('/api/companies/1/public');
    if (r.ok) {
      const c = await r.json();
      if (c.company_name) document.getElementById('billAptName').textContent = c.company_name;
      const cl = document.getElementById('companyLabel');
      cl.textContent = c.company_name || '';
      cl.style.display = c.company_name ? '' : 'none';
      // 민원/당근: 비활성화로 명시된 경우만 숨김
      if (c.enable_complaint !== false) document.getElementById('complaintNavLink').style.display = '';
      if (c.enable_market    !== false) document.getElementById('daangnNavLink').style.display = '';
    } else {
      // API 실패 시 기본적으로 링크 표시
      document.getElementById('complaintNavLink').style.display = '';
      document.getElementById('daangnNavLink').style.display = '';
    }
  } catch {
    document.getElementById('complaintNavLink').style.display = '';
    document.getElementById('daangnNavLink').style.display = '';
  }
})();

const DONG = '1'; // 세종푸르지오시티 2차는 1동 고정

let otpCountdownTimer = null;
let sessionCountdownTimer = null;
let sessionHideTimer = null;

const errEl = document.getElementById('errorMsg');

function fmt(v) {
  const n = parseInt(String(v).replace(/,/g, ''), 10);
  return isNaN(n) ? (v || '0') : n.toLocaleString('ko-KR');
}

function ym(ym6) {
  if (!ym6 || ym6.length < 6) return '';
  return `${ym6.slice(0,4)}년 ${parseInt(ym6.slice(4,6))}월분`;
}

function showError(msg) {
  errEl.textContent = msg;
  errEl.classList.add('show');
}

function clearError() {
  errEl.classList.remove('show');
  errEl.textContent = '';
}

function messageFrom(d, fallback) {
  if (!d) return fallback;
  if (d.message) return d.message;
  if (d.detail) return d.detail;
  if (d.error) return '요청이 너무 많습니다. 잠시 후 다시 시도해 주세요.';
  return fallback;
}

function pad2(n) { return String(n).padStart(2, '0'); }

function startOtpCountdown(seconds) {
  clearInterval(otpCountdownTimer);
  const timerEl = document.getElementById('otpTimer');
  const codeInput = document.getElementById('inp-code');
  const verifyBtn = document.getElementById('btnVerifyOtp');
  let remain = seconds;

  const tick = () => {
    if (remain <= 0) {
      clearInterval(otpCountdownTimer);
      timerEl.textContent = '인증번호가 만료되었습니다. 재발송해 주세요.';
      codeInput.disabled = true;
      verifyBtn.disabled = true;
      return;
    }
    timerEl.textContent = `남은 시간 ${pad2(Math.floor(remain / 60))}:${pad2(remain % 60)}`;
    remain--;
  };

  tick();
  otpCountdownTimer = setInterval(tick, 1000);
}

function startSessionCountdown(seconds) {
  clearInterval(sessionCountdownTimer);
  clearTimeout(sessionHideTimer);
  const timerEl = document.getElementById('sessionTimer');
  let remain = seconds;

  const tick = () => {
    if (remain <= 0) {
      clearInterval(sessionCountdownTimer);
      return;
    }
    timerEl.textContent = `조회 결과는 ${pad2(Math.floor(remain / 60))}:${pad2(remain % 60)} 후 자동으로 숨겨집니다`;
    remain--;
  };

  tick();
  sessionCountdownTimer = setInterval(tick, 1000);
  sessionHideTimer = setTimeout(() => {
    resetToSearch('인증이 만료되었습니다. 다시 인증해 주세요.');
  }, seconds * 1000);
}

function resetToSearch(message) {
  clearInterval(otpCountdownTimer);
  clearInterval(sessionCountdownTimer);
  clearTimeout(sessionHideTimer);

  document.getElementById('billCard').classList.remove('show');
  document.getElementById('verifyCard').style.display = '';
  document.getElementById('otpArea').style.display = 'none';
  document.getElementById('inp-code').value = '';
  document.getElementById('inp-code').disabled = false;
  document.getElementById('btnVerifyOtp').disabled = false;
  document.getElementById('btnResend').disabled = false;

  clearError();
  if (message) showError(message);
}

function renderBill(d) {
  document.getElementById('billUnit').textContent   = `${d.dong}동 ${d.ho}호  ${d.name}`;
  document.getElementById('billPeriod').textContent = ym(d.year_month);
  document.getElementById('billTotal').textContent      = d.total       ? fmt(d.total) : '—';
  document.getElementById('billTotalAfter').textContent = d.total_after ? fmt(d.total_after) : '';

  // ── 고지내역 요약 ─────────────────────────────────────────
  const summaryBody = document.getElementById('summaryTableBody');
  summaryBody.innerHTML = '';
  const summaryEntries = Object.entries(d.summary || {});
  if (summaryEntries.length === 0) {
    summaryBody.innerHTML = '<tr><td colspan="2" class="no-data">데이터 없음</td></tr>';
    document.getElementById('summarySection').style.display = 'none';
  } else {
    document.getElementById('summarySection').style.display = '';
    for (const [k, v] of summaryEntries) {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${k}</td><td class="amt">${fmt(v)}</td>`;
      summaryBody.appendChild(tr);
    }
  }

  // ── 검침내역 ─────────────────────────────────────────────
  const meterEntries = Object.entries(d.meter || {});
  const meterSec  = document.getElementById('meterSection');
  const mBody     = document.getElementById('meterTableBody');
  mBody.innerHTML = '';
  if (meterEntries.length > 0) {
    meterSec.style.display = '';
    for (const [item, fields] of meterEntries) {
      const tr = document.createElement('tr');
      const 요금 = fields['요금'] || '0';
      tr.innerHTML = `<td>${item}</td><td>${fields['전월'] || '—'}</td><td>${fields['당월'] || '—'}</td><td>${fmt(요금)}</td>`;
      mBody.appendChild(tr);
    }
  } else {
    meterSec.style.display = 'none';
  }

  // ── 항목별 부과내역 (구분 포함) ──────────────────────────
  const itemEntries = Object.entries(d.billing_items || {});
  const 구분Map    = d.billing_구분 || {};
  const itemSec    = document.getElementById('itemSection');
  const itemBody   = document.getElementById('itemTableBody');
  itemBody.innerHTML = '';

  if (itemEntries.length > 0) {
    itemSec.style.display = '';
    let 과세합 = 0, 비과세합 = 0;
    const has구분 = Object.keys(구분Map).length > 0;

    for (const [k, v] of itemEntries) {
      const n = parseInt(String(v).replace(/,/g, ''), 10);
      const 구분 = 구분Map[k] || '';
      if (!isNaN(n)) {
        if (구분 === '과') 과세합  += n;
        if (구분 === '비') 비과세합 += n;
      }
      const tr = document.createElement('tr');
      const divCell = has구분
        ? `<td class="div-badge ${구분}">${구분}</td>`
        : '';
      tr.innerHTML = `<td>${k}</td><td class="amt">${fmt(v)}</td>${divCell}`;
      itemBody.appendChild(tr);
    }

    // 과세합 / 비과세합 (구분 데이터 있을 때만)
    if (has구분) {
      // 고지내역 요약에서 더 정확한 값 사용 (있으면)
      const sum = d.summary || {};
      const 공급가액    = parseInt(String(sum['공급가액']    || '0').replace(/,/g,''), 10) || 과세합;
      const 부가가치세  = parseInt(String(sum['부가가치세']  || '0').replace(/,/g,''), 10) || 0;
      const 비과세합계  = parseInt(String(sum['비과세합계']  || '0').replace(/,/g,''), 10) || 비과세합;

      const 과세총합 = 공급가액 + 부가가치세;

      if (과세총합 > 0) {
        const tr1 = document.createElement('tr');
        tr1.className = 'subtotal-row';
        tr1.innerHTML = `<td>과세합</td><td class="amt">${fmt(과세총합)}</td><td></td>`;
        itemBody.appendChild(tr1);
      }
      if (비과세합계 > 0) {
        const tr2 = document.createElement('tr');
        tr2.className = 'subtotal-row';
        tr2.innerHTML = `<td>비과세합</td><td class="amt">${fmt(비과세합계)}</td><td></td>`;
        itemBody.appendChild(tr2);
      }
    }

    const trTotal = document.createElement('tr');
    trTotal.className = 'total-row';
    trTotal.innerHTML = `<td>당월 납부금액</td><td class="amt">${fmt(d.total || '')}</td>${has구분 ? '<td></td>' : ''}`;
    itemBody.appendChild(trTotal);
  } else {
    itemSec.style.display = 'none';
  }

  document.getElementById('billCard').classList.add('show');
  document.getElementById('billCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// 인증번호 받기
document.getElementById('btnSendSms').addEventListener('click', async () => {
  const ho = document.getElementById('inp-ho').value.trim();
  clearError();

  if (!ho) {
    showError('호를 입력해 주세요.');
    return;
  }

  const btn = document.getElementById('btnSendSms');
  btn.disabled = true;
  btn.textContent = '발송 중...';

  try {
    const res = await fetch('/api/fee/send-sms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dong: DONG, ho }),
    });
    const d = await res.json().catch(() => ({}));

    if (!res.ok || !d.success) {
      showError(messageFrom(d, '인증번호 발송에 실패했습니다.'));
      return;
    }

    document.getElementById('otpInfo').textContent = `${d.masked_phone}로 인증번호를 발송했습니다.`;
    document.getElementById('otpArea').style.display = '';
    const codeInput = document.getElementById('inp-code');
    codeInput.disabled = false;
    codeInput.value = '';
    document.getElementById('btnVerifyOtp').disabled = false;
    document.getElementById('btnResend').disabled = false;
    startOtpCountdown(d.expires_in || 300);
    codeInput.focus();
  } catch (e) {
    showError('서버 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
  } finally {
    btn.disabled = false;
    btn.textContent = '인증번호 받기';
  }
});

// 인증번호 재발송
document.getElementById('btnResend').addEventListener('click', () => {
  document.getElementById('btnSendSms').click();
});

// 조회하기 (인증번호 검증 → 관리비 조회)
document.getElementById('btnVerifyOtp').addEventListener('click', async () => {
  const ho = document.getElementById('inp-ho').value.trim();
  const code = document.getElementById('inp-code').value.trim();
  clearError();
  document.getElementById('billCard').classList.remove('show');

  if (!/^\d{6}$/.test(code)) {
    showError('6자리 인증번호를 입력해 주세요.');
    return;
  }

  const btn = document.getElementById('btnVerifyOtp');
  btn.disabled = true;
  btn.textContent = '확인 중...';

  try {
    const vres = await fetch('/api/fee/verify-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dong: DONG, ho, code }),
    });
    const vd = await vres.json().catch(() => ({}));

    if (!vres.ok || !vd.success) {
      showError(messageFrom(vd, '인증에 실패했습니다.'));
      return;
    }

    clearInterval(otpCountdownTimer);

    const fres = await fetch(`/api/fee?dong=${encodeURIComponent(DONG)}&ho=${encodeURIComponent(ho)}`, {
      headers: { 'Authorization': `Bearer ${vd.token}` },
    });
    const fd = await fres.json().catch(() => ({}));

    if (!fres.ok) {
      showError(messageFrom(fd, '조회에 실패했습니다.'));
      return;
    }

    renderBill(fd);
    document.getElementById('verifyCard').style.display = 'none';
    startSessionCountdown(vd.expires_in || 600);

  } catch (e) {
    showError('서버 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
  } finally {
    btn.disabled = false;
    btn.textContent = '조회하기';
  }
});

// 다른 호수 조회
document.getElementById('btnNewSearch').addEventListener('click', () => {
  document.getElementById('inp-ho').value = '';
  resetToSearch();
});

// 엔터키 제출
document.getElementById('inp-ho').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btnSendSms').click();
});
document.getElementById('inp-code').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btnVerifyOtp').click();
});
</script>
</body>
</html>
