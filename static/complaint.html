<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>민원게시판</title>
<link rel="icon" type="image/png" href="/assets/images/logo.png">
<link rel="stylesheet" href="/css/complaint.css?v=1">
</head>
<body>

<div class="cp-header">
  <button class="cp-back" onclick="location.href='/'">←</button>
  <h1>📋 민원게시판</h1>
  <div class="cp-header-right" id="adminBadge"></div>
</div>

<!-- 관리자 로그인 모달 -->
<div class="cp-modal-overlay" id="adminLoginModal" style="display:none" onclick="closeAdminLoginModal(event)">
  <div class="cp-modal" onclick="event.stopPropagation()" style="max-width:340px">
    <h3>관리자 로그인</h3>
    <div style="margin:12px 0 6px">
      <label style="font-size:13px;color:#555;display:block;margin-bottom:4px">회사번호</label>
      <input class="cp-input" id="alCompanyId" type="number" placeholder="회사번호" style="width:100%">
    </div>
    <div style="margin-bottom:6px">
      <label style="font-size:13px;color:#555;display:block;margin-bottom:4px">이메일</label>
      <input class="cp-input" id="alEmail" type="email" placeholder="이메일" style="width:100%">
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:13px;color:#555;display:block;margin-bottom:4px">비밀번호</label>
      <input class="cp-input" id="alPassword" type="password" placeholder="비밀번호" style="width:100%">
    </div>
    <div id="alErr" style="color:#c62828;font-size:13px;margin-bottom:8px;display:none"></div>
    <div class="cp-modal-btns">
      <button style="background:#E0E0E0;color:#212121;flex:1" onclick="closeAdminLoginModal()">취소</button>
      <button style="background:var(--primary);color:#fff;flex:1" id="alSubmitBtn" onclick="doAdminLogin()">로그인</button>
    </div>
  </div>
</div>

<div id="postList" class="cp-list"></div>

<div id="emptyState" class="cp-empty" style="display:none">
  <span class="emoji">📋</span>
  <p>아직 민원글이 없어요.<br>첫 번째 민원을 남겨보세요!</p>
</div>

<a href="#" class="cp-fab" id="writeBtn" title="민원 작성">+</a>

<script src="/js/complaint.js?v=1"></script>
<script>
const companyId = getCompanyParam();
if (!companyId) {
    alert('잘못된 접근입니다. 메인 페이지에서 이동해주세요.');
    location.href = '/';
}

// 글쓰기 버튼 → company 파라미터 유지
document.getElementById('writeBtn').href = `/complaint-write.html?company=${companyId}`;

// 헤더 관리자 UI
function renderAdminBadge() {
    const badge = document.getElementById('adminBadge');
    if (ComplaintAuth.isAdmin()) {
        badge.innerHTML = `<span style="font-size:11px;background:rgba(255,255,255,0.25);padding:2px 8px;border-radius:12px;margin-right:6px">관리자</span><button onclick="doAdminLogout()" style="background:none;border:none;color:#fff;font-size:12px;cursor:pointer;opacity:0.85">로그아웃</button>`;
    } else {
        badge.innerHTML = `<button onclick="document.getElementById('adminLoginModal').style.display='flex'" style="background:none;border:none;color:#fff;font-size:12px;cursor:pointer;opacity:0.85">관리자 로그인</button>`;
    }
}
renderAdminBadge();

function closeAdminLoginModal(e) {
    if (!e || e.target === document.getElementById('adminLoginModal')) {
        document.getElementById('adminLoginModal').style.display = 'none';
    }
}

async function doAdminLogin() {
    const companyIdVal = document.getElementById('alCompanyId').value.trim();
    const email = document.getElementById('alEmail').value.trim();
    const password = document.getElementById('alPassword').value;
    const errEl = document.getElementById('alErr');
    const btn = document.getElementById('alSubmitBtn');

    if (!companyIdVal || !email || !password) {
        errEl.textContent = '모든 항목을 입력해주세요.'; errEl.style.display = 'block'; return;
    }
    btn.disabled = true; btn.textContent = '로그인 중...'; errEl.style.display = 'none';

    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ company_id: parseInt(companyIdVal), email, password, remember: false }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || data.message || '로그인 실패');
        if (!data.success) throw new Error(data.message || '로그인 실패');

        const session = data.session;
        const role = session?.role;
        if (role !== 'admin' && role !== 'super_admin') {
            throw new Error('관리자 계정이 아닙니다.');
        }

        // acc_auth_session에 저장 (기존 login.js의 AuthSession.save 형식 그대로)
        const token = data.token || session?.token || null;
        const sessionData = { ...session, token, isLoggedIn: true };
        sessionStorage.setItem('acc_auth_session', JSON.stringify(sessionData));

        document.getElementById('adminLoginModal').style.display = 'none';
        renderAdminBadge();
        showCpToast('관리자로 로그인되었습니다.');
    } catch (e) {
        errEl.textContent = e.message; errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = '로그인';
    }
}

function doAdminLogout() {
    sessionStorage.removeItem('acc_auth_session');
    localStorage.removeItem('acc_auth_session');
    renderAdminBadge();
    showCpToast('로그아웃되었습니다.');
}

let currentPage = 1;
let totalPages = 1;

async function loadPosts(page) {
    const list = document.getElementById('postList');
    const empty = document.getElementById('emptyState');
    if (page === 1) list.innerHTML = '<div style="text-align:center;padding:40px;color:#aaa">불러오는 중...</div>';

    try {
        const data = await cpFetch(`?company_id=${companyId}&page=${page}`);
        totalPages = data.pages;
        currentPage = page;

        if (page === 1) list.innerHTML = '';

        if (!data.items || data.items.length === 0) {
            if (page === 1) empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';

        data.items.forEach(p => {
            if (p.is_deleted) {
                const div = document.createElement('div');
                div.className = 'cp-deleted-notice';
                div.textContent = `${escHtml(p.delete_reason)} 사유로 글이 삭제되었습니다.`;
                list.appendChild(div);
                return;
            }
            const a = document.createElement('a');
            a.className = 'cp-item';
            a.href = `/complaint-post.html?id=${p.id}&company=${companyId}`;
            a.innerHTML = `
              <div class="cp-item-top">
                <div class="cp-item-title">${escHtml(p.title)}</div>
                ${p.has_reply ? '<span class="cp-badge cp-badge-reply">답변완료</span>' : ''}
              </div>
              <div class="cp-item-meta">
                <span>${escHtml(p.writer)}</span>
                <span>${p.time_ago}</span>
              </div>
              ${p.preview ? `<div class="cp-item-preview">${escHtml(p.preview)}</div>` : ''}`;
            list.appendChild(a);
        });

        // 더보기
        if (currentPage < totalPages) {
            const btn = document.createElement('button');
            btn.id = 'loadMoreBtn';
            btn.textContent = '더보기';
            btn.style.cssText = 'display:block;width:calc(100% - 24px);margin:8px 12px;padding:12px;background:#fff;border:1px solid #ddd;border-radius:10px;font-size:14px;cursor:pointer;';
            btn.onclick = () => { btn.remove(); loadPosts(currentPage + 1); };
            list.appendChild(btn);
        }
    } catch (e) {
        list.innerHTML = `<div class="cp-empty"><p>${e.message}</p></div>`;
    }
}

loadPosts(1);
</script>
</body>
</html>
