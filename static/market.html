<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>우리아파트 당근</title>
<link rel="icon" type="image/png" href="/assets/images/logo.png">
<link rel="stylesheet" href="/css/common.css?v=13">
<link rel="stylesheet" href="/css/market.css?v=4">
</head>
<body>

<header class="header" role="banner">
  <div class="header-left">
    <a href="/" class="header-logo" aria-label="AI Helper 홈으로 이동">
      <img src="/assets/images/robot.png" alt="AI Helper 로고">
      <span class="logo-text">AI Helper</span>
    </a>
    <nav class="header-nav">
      <a href="/" id="mktChatbotNav"><span class="nav-long">AI 챗봇</span><span class="nav-short">챗봇</span></a>
      <a href="#" id="mktComplaintNav" style="display:none"><span class="nav-long">민원게시판</span><span class="nav-short">민원</span></a>
      <a href="/market.html" class="active"><span class="nav-long">🥕 우리아파트 당근</span><span class="nav-short">🥕당근</span></a>
    </nav>
  </div>
  <div class="header-right">
    <span id="mktHeaderCompanyLabel" class="company-label" style="display:none"></span>
    <a href="/login.html" class="btn btn-outline btn-sm" id="mktHeaderLoginLink" data-short="🔐">관리자 로그인</a>
    <a href="/admin.html" class="btn btn-outline btn-sm" id="mktHeaderAdminLink" data-short="관리자" style="display:none">관리자</a>
  </div>
</header>

<div class="mkt-header">
  <button class="mkt-back" onclick="location.href='/'">&#8249;</button>
  <h1>우리아파트 당근</h1>
  <div class="mkt-header-right">
    <span id="myUnit" style="font-size:12px;color:#666"></span>
    <button id="logoutBtn" style="background:none;border:none;color:#666;font-size:12px;cursor:pointer;display:none" onclick="logout()">로그아웃</button>
    <button id="loginBtn" style="background:none;border:none;color:#4F46E5;font-size:12px;cursor:pointer;font-weight:600;display:none" onclick="goLogin()">인증하기</button>
  </div>
</div>

<div class="mkt-pills" id="pills">
  <button class="mkt-pill active" data-cat="전체" onclick="selectCat(this)">🥕 전체</button>
  <button class="mkt-pill" data-cat="중고거래" onclick="selectCat(this)">🛒 중고거래</button>
  <button class="mkt-pill" data-cat="무료나눔" onclick="selectCat(this)">🎁 무료나눔</button>
  <button class="mkt-pill" data-cat="공동구매" onclick="selectCat(this)">🤝 공동구매</button>
  <button class="mkt-pill" data-cat="분실물" onclick="selectCat(this)">🔍 분실물</button>
</div>

<div id="postList" class="mkt-list"></div>

<div id="emptyState" class="mkt-empty" style="display:none">
  <span class="emoji">🥕</span>
  <p>아직 게시글이 없어요.<br>첫 번째 글을 올려보세요!</p>
</div>

<a href="#" class="mkt-fab" title="글쓰기" onclick="goWrite(); return false;">+</a>

<script src="/js/market.js?v=2"></script>
<script>
// ── 공통 헤더 초기화 ────────────────────────────────────────────────────────
(function () {
    var companyName = sessionStorage.getItem('market_company_name') || '';
    var companyId   = sessionStorage.getItem('market_company_id') || sessionStorage.getItem('complaint_company_id') || '';
    var labelEl = document.getElementById('mktHeaderCompanyLabel');
    if (labelEl && companyName) { labelEl.textContent = companyName; labelEl.style.display = ''; }
    var complaintNav = document.getElementById('mktComplaintNav');
    if (complaintNav && companyId) { complaintNav.href = '/complaint.html?company=' + companyId; complaintNav.style.display = ''; }
    var chatbotNav = document.getElementById('mktChatbotNav');
    if (chatbotNav && companyId) { chatbotNav.href = '/?company=' + companyId; }
    try {
        var authRaw = sessionStorage.getItem('acc_auth_session') || localStorage.getItem('acc_auth_session');
        var sess = authRaw ? JSON.parse(authRaw) : null;
        var loginBtn = document.getElementById('mktHeaderLoginLink');
        var adminBtn = document.getElementById('mktHeaderAdminLink');
        if (sess && sess.isLoggedIn && sess.token) {
            if (loginBtn) loginBtn.style.display = 'none';
            if (adminBtn) { adminBtn.style.display = ''; adminBtn.textContent = '관리자 (' + (sess.fullName || sess.username || '') + ')'; }
        }
    } catch (e) {}
})();

let currentCat = '전체';

// 인증 상태에 따라 헤더 버튼 표시
(function () {
  const user = MarketAuth.getUser();
  if (MarketAuth.getToken() && user) {
    document.getElementById('myUnit').textContent = user.unit;
    document.getElementById('logoutBtn').style.display = '';
  } else {
    document.getElementById('loginBtn').style.display = '';
  }
})();

function goLogin(returnUrl) {
  const r = returnUrl || location.pathname + location.search;
  location.href = '/market-login.html?return=' + encodeURIComponent(r);
}

function logout() {
  MarketAuth.clear();
  location.reload();
}

function goWrite() {
  if (!MarketAuth.getToken()) {
    goLogin('/market-write.html');
    return;
  }
  location.href = '/market-write.html';
}

function goPost(id) {
  if (!MarketAuth.getToken()) {
    goLogin('/market-post.html?id=' + id);
    return;
  }
  location.href = '/market-post.html?id=' + id;
}

function selectCat(el) {
  document.querySelectorAll('.mkt-pill').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentCat = el.dataset.cat;
  loadPosts();
}

async function loadPosts() {
  const list = document.getElementById('postList');
  const empty = document.getElementById('emptyState');
  list.innerHTML = '<div style="text-align:center;padding:40px;color:#aaa">불러오는 중...</div>';
  try {
    const params = currentCat !== '전체' ? `?category=${encodeURIComponent(currentCat)}` : '';
    const data = await mktFetchPublic('/posts' + params);
    list.innerHTML = '';
    if (!data.items || data.items.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    data.items.forEach(p => {
      const thumbHtml = p.thumbnail
        ? `<img class="mkt-thumb" src="${p.thumbnail}" alt="" loading="lazy">`
        : `<div class="mkt-thumb-placeholder">${categoryEmoji(p.category)}</div>`;

      const badge = statusBadge(p.status);
      const commentHtml = p.comment_count > 0
        ? `<div class="mkt-bottom"><span class="mkt-comment-count"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> ${p.comment_count}</span></div>`
        : '';

      const div = document.createElement('div');
      div.className = 'mkt-item';
      div.onclick = () => goPost(p.id);
      div.innerHTML = `
        <div class="mkt-info">
          <div class="mkt-meta">${escHtml(p.writer_unit)} · ${p.time_ago}${badge ? ' ' + badge : ''}</div>
          <div class="mkt-title">${escHtml(p.title)}</div>
          <div class="mkt-price">${formatPrice(p.price, p.category)}</div>
          ${commentHtml}
        </div>
        ${thumbHtml}`;
      list.appendChild(div);
    });
  } catch (e) {
    list.innerHTML = `<div class="mkt-empty"><p>${e.message}</p></div>`;
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadPosts();
</script>
</body>
</html>
