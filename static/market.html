<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>우리아파트 당근</title>
<link rel="stylesheet" href="/css/market.css?v=1">
</head>
<body>

<div class="mkt-header">
  <button class="mkt-back" onclick="location.href='/'">←</button>
  <h1>🥕 우리아파트 당근</h1>
  <div class="mkt-header-right">
    <span id="myUnit" style="font-size:13px;opacity:0.9"></span>
    <button id="logoutBtn" style="background:none;border:none;color:#fff;font-size:12px;cursor:pointer;opacity:0.8;display:none" onclick="logout()">로그아웃</button>
    <button id="loginBtn"  style="background:none;border:none;color:#fff;font-size:13px;cursor:pointer;font-weight:600;display:none" onclick="goLogin()">🔐 인증하기</button>
  </div>
</div>

<div class="mkt-tabs" id="tabs">
  <button class="mkt-tab active" data-cat="전체" onclick="selectCat(this)">전체</button>
  <button class="mkt-tab" data-cat="중고거래" onclick="selectCat(this)">🛍 중고거래</button>
  <button class="mkt-tab" data-cat="무료나눔" onclick="selectCat(this)">🎁 무료나눔</button>
  <button class="mkt-tab" data-cat="공동구매" onclick="selectCat(this)">🤝 공동구매</button>
  <button class="mkt-tab" data-cat="분실물" onclick="selectCat(this)">🔍 분실물</button>
</div>

<div id="postList" class="mkt-list"></div>

<div id="emptyState" class="mkt-empty" style="display:none">
  <span class="emoji">🥕</span>
  <p>아직 게시글이 없어요.<br>첫 번째 글을 올려보세요!</p>
</div>

<a href="#" class="mkt-fab" title="글쓰기" onclick="goWrite(); return false;">+</a>

<script src="/js/market.js?v=2"></script>
<script>
let currentCat = '전체';

// 인증 상태에 따라 헤더 버튼 표시
(function () {
  const user = MarketAuth.getUser();
  if (MarketAuth.getToken() && user) {
    document.getElementById('myUnit').textContent = user.unit;
    document.getElementById('logoutBtn').style.display = '';
  } else {
    document.getElementById('loginBtn').style.display = '';
  }
})();

function goLogin(returnUrl) {
  const r = returnUrl || location.pathname + location.search;
  location.href = '/market-login.html?return=' + encodeURIComponent(r);
}

function logout() {
  MarketAuth.clear();
  location.reload();
}

/** 글쓰기: 토큰 없으면 인증, 있으면 바로 이동 */
function goWrite() {
  if (!MarketAuth.getToken()) {
    goLogin('/market-write.html');
    return;
  }
  location.href = '/market-write.html';
}

/** 게시글 클릭: 인증 없으면 로그인 페이지로 */
function goPost(id) {
  if (!MarketAuth.getToken()) {
    goLogin('/market-post.html?id=' + id);
    return;
  }
  location.href = '/market-post.html?id=' + id;
}

function selectCat(el) {
  document.querySelectorAll('.mkt-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentCat = el.dataset.cat;
  loadPosts();
}

async function loadPosts() {
  const list = document.getElementById('postList');
  const empty = document.getElementById('emptyState');
  list.innerHTML = '<div style="text-align:center;padding:40px;color:#aaa">불러오는 중...</div>';
  try {
    const params = currentCat !== '전체' ? `?category=${encodeURIComponent(currentCat)}` : '';
    const data = await mktFetchPublic('/posts' + params);
    list.innerHTML = '';
    if (!data.items || data.items.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    data.items.forEach(p => {
      const imgHtml = p.thumbnail
        ? `<img class="mkt-thumb" src="${p.thumbnail}" alt="" loading="lazy">`
        : `<div class="mkt-thumb-placeholder">${categoryEmoji(p.category)}</div>`;

      const div = document.createElement('div');
      div.className = 'mkt-item';
      div.style.cursor = 'pointer';
      div.onclick = () => goPost(p.id);
      div.innerHTML = `
        ${imgHtml}
        <div class="mkt-info">
          <div class="mkt-title">${escHtml(p.title)}</div>
          <div class="mkt-meta">${escHtml(p.writer_unit)} · ${p.time_ago}</div>
          <div class="mkt-price">${formatPrice(p.price, p.category)}</div>
          <div class="mkt-bottom">
            ${statusBadge(p.status)}
            ${p.comment_count > 0 ? `<span class="mkt-comment-count">💬 ${p.comment_count}</span>` : ''}
          </div>
        </div>`;
      list.appendChild(div);
    });
  } catch (e) {
    list.innerHTML = `<div class="mkt-empty"><p>${e.message}</p></div>`;
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadPosts();
</script>
</body>
</html>
