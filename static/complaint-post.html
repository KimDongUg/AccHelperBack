<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>민원 상세</title>
<link rel="icon" type="image/png" href="/assets/images/logo.png">
<link rel="stylesheet" href="/css/complaint.css?v=1">
</head>
<body>

<div class="cp-header">
  <button class="cp-back" id="backBtn">←</button>
  <h1>민원 내용</h1>
</div>

<div id="postContent">
  <div style="text-align:center;padding:60px;color:#aaa">불러오는 중...</div>
</div>

<!-- 삭제 모달 -->
<div class="cp-modal-overlay" id="deleteModal" style="display:none" onclick="closeDeleteModal(event)">
  <div class="cp-modal" onclick="event.stopPropagation()">
    <h3>삭제 사유를 입력하세요</h3>
    <textarea id="deleteReasonInput" placeholder="삭제 사유">민원글이 아니어서 삭제 되었습니다!</textarea>
    <div class="cp-modal-btns">
      <button style="background:#E0E0E0;color:#212121" onclick="closeDeleteModal()">취소</button>
      <button style="background:#E74C3C;color:#fff" onclick="confirmDelete()">삭제</button>
    </div>
  </div>
</div>

<script src="/js/complaint.js?v=1"></script>
<script>
const companyId = getCompanyParam();
const postId = new URLSearchParams(location.search).get('id');
const isAdmin = ComplaintAuth.isAdmin();

document.getElementById('backBtn').onclick = () => {
    location.href = `/complaint.html?company=${companyId}`;
};

if (!postId) { location.href = '/'; }

let post = null;
let replyFormVisible = false;

async function loadPost() {
    try {
        post = await cpFetch(`/${postId}`);
        renderPost(post);
    } catch (e) {
        document.getElementById('postContent').innerHTML =
            `<div class="cp-empty"><p>${e.message}</p></div>`;
    }
}

function renderPost(p) {
    const wrap = document.getElementById('postContent');

    if (p.is_deleted) {
        wrap.innerHTML = `
          <div class="cp-post-body">
            <div class="cp-post-deleted">
              ${escHtml(p.delete_reason)} 사유로 글이 삭제되었습니다.
            </div>
          </div>`;
        return;
    }

    wrap.innerHTML = `
      <div class="cp-post-body">
        <div class="cp-post-title">${escHtml(p.title)}</div>
        <div class="cp-post-meta">
          <span>📍 ${escHtml(p.writer)}</span>
          <span>${p.time_ago}</span>
        </div>
        <div class="cp-post-content">${escHtml(p.content)}</div>
      </div>`;

    // 답변 표시
    if (p.reply) {
        const replyDiv = document.createElement('div');
        replyDiv.className = 'cp-reply-wrap';
        replyDiv.id = 'replyArea';
        replyDiv.innerHTML = `
          <div class="cp-reply-label">🏢 관리자 답변</div>
          <div class="cp-reply-content">${escHtml(p.reply.content)}</div>
          <div class="cp-reply-time">${p.reply.time_ago}</div>`;
        wrap.after(replyDiv);
    }

    // 관리자 패널
    if (isAdmin) {
        const panel = document.createElement('div');
        panel.className = 'cp-admin-panel';
        panel.id = 'adminPanel';
        panel.innerHTML = `
          <div class="cp-admin-panel-title">관리자 기능</div>
          <div class="cp-admin-btns">
            <button class="cp-btn cp-btn-outline" onclick="toggleReplyForm()" id="replyToggleBtn">
              ${p.reply ? '답변 수정' : '답변 작성'}
            </button>
            <button class="cp-btn cp-btn-danger" onclick="showDeleteModal()">글 삭제</button>
          </div>
          <div class="cp-reply-form" id="replyForm" style="display:none">
            <textarea id="replyInput" placeholder="답변 내용을 입력하세요...">${p.reply ? escHtml(p.reply.content) : ''}</textarea>
            <div style="display:flex;gap:8px">
              <button class="cp-btn cp-btn-gray" style="flex:1" onclick="toggleReplyForm()">취소</button>
              <button class="cp-btn" style="flex:1" onclick="submitReply()">답변 등록</button>
            </div>
          </div>`;

        // 답변 영역 다음에 또는 post-body 다음에 삽입
        const replyArea = document.getElementById('replyArea');
        if (replyArea) {
            replyArea.after(panel);
        } else {
            wrap.after(panel);
        }
    }
}

function toggleReplyForm() {
    replyFormVisible = !replyFormVisible;
    document.getElementById('replyForm').style.display = replyFormVisible ? 'block' : 'none';
    document.getElementById('replyToggleBtn').textContent = replyFormVisible ? '취소' : (post.reply ? '답변 수정' : '답변 작성');
}

async function submitReply() {
    const content = document.getElementById('replyInput').value.trim();
    if (!content) { showCpToast('답변 내용을 입력하세요.'); return; }
    try {
        await cpFetch(`/${postId}/reply`, { method: 'POST', body: { content } });
        showCpToast('답변이 등록되었습니다.');
        loadPost();
    } catch (e) { showCpToast(e.message); }
}

function showDeleteModal() {
    document.getElementById('deleteModal').style.display = 'flex';
}
function closeDeleteModal(e) {
    if (!e || e.target === document.getElementById('deleteModal')) {
        document.getElementById('deleteModal').style.display = 'none';
    }
}
async function confirmDelete() {
    const reason = document.getElementById('deleteReasonInput').value.trim() || '민원글이 아니어서 삭제 되었습니다!';
    try {
        await cpFetch(`/${postId}`, { method: 'DELETE', body: { reason } });
        showCpToast('삭제되었습니다.');
        closeDeleteModal();
        setTimeout(() => location.href = `/complaint.html?company=${companyId}`, 800);
    } catch (e) { showCpToast(e.message); }
}

loadPost();
</script>
</body>
</html>
